<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drum Lab</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #111;
        color: #eee;
        padding: 2rem;
        min-height: 100vh;
      }

      h1 {
        font-size: 1.4rem;
        margin-bottom: 1.5rem;
        color: #aaa;
        letter-spacing: 0.05em;
      }

      #pad-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 0.75rem;
        margin-bottom: 2rem;
      }

      .pad {
        padding: 1.25rem 0.5rem;
        border-radius: 10px;
        border: 2px solid #333;
        background: #1a1a1a;
        color: #ccc;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        cursor: pointer;
        text-align: center;
        transition:
          background 80ms,
          border-color 80ms,
          transform 80ms;
        user-select: none;
      }
      .pad:active {
        transform: scale(0.95);
      }
      .pad.active {
        border-color: #7c6aff;
        background: #1e1a33;
        color: #c4b8ff;
      }
      .pad.flash {
        background: #3d3060;
      }

      #params {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 1.5rem;
        min-height: 80px;
      }

      #params h2 {
        font-size: 0.85rem;
        color: #888;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 1.25rem;
      }

      .param-row {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 0.9rem;
      }
      .param-row label {
        width: 130px;
        font-size: 0.8rem;
        color: #888;
        flex-shrink: 0;
      }
      .param-row input[type="range"] {
        flex: 1;
        accent-color: #7c6aff;
      }
      .param-row .val {
        width: 50px;
        text-align: right;
        font-size: 0.8rem;
        color: #aaa;
        font-variant-numeric: tabular-nums;
      }

      #empty-msg {
        color: #555;
        font-size: 0.9rem;
      }

      .section-heading {
        font-size: 0.8rem;
        color: #555;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 0.75rem;
      }

      .sample-kit {
        margin-bottom: 2rem;
      }

      .sample-loading {
        color: #555;
        font-size: 0.85rem;
        padding: 0.5rem 0;
      }

      .sample-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 0.75rem;
      }

      .sample-pad {
        padding: 1.25rem 0.5rem;
        border-radius: 10px;
        border: 2px solid #2a3a2a;
        background: #151e15;
        color: #aaccaa;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        cursor: pointer;
        text-align: center;
        transition:
          background 80ms,
          border-color 80ms,
          transform 80ms;
        user-select: none;
      }
      .sample-pad:active {
        transform: scale(0.95);
      }
      .sample-pad.flash {
        background: #243824;
        border-color: #5a9a5a;
      }
      .sample-pad:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .synth-section-heading {
        font-size: 0.8rem;
        color: #555;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 0.75rem;
      }
    </style>
  </head>
  <body>
    <h1>🥁 Drum Lab</h1>

    <div id="sample-kit" class="sample-kit">
      <div class="section-heading">Sample Kit — MuldjordKit (CC BY 4.0)</div>
      <div class="sample-loading">Loading samples…</div>
      <div class="sample-grid"></div>
    </div>

    <div class="synth-section-heading">Synth Kit</div>
    <div id="pad-grid"></div>
    <div id="params"><span id="empty-msg">Select a pad to tweak its parameters.</span></div>
    <script type="module" src="/src/drum-test.ts"></script>
  </body>
</html>
